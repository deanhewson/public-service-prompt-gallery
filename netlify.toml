[build]
  command = "npm run build"
  publish = "dist"

# Astro fingerprints JS/CSS bundles with content hashes — safe to cache permanently
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicons rarely change
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — short cache so content updates propagate within an hour
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/workflows/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
